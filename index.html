<!-- index.html -->
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>МережаЗв'язків • Теорія Графів</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="logo">
                <i class="fas fa-project-diagram"></i>
                <h1>МережаЗв'язків</h1>
            </div>
            
            <nav class="menu">
                <a href="#" onclick="switchTab(0)" class="active"><i class="fas fa-users"></i> Граф</a>
                <a href="#" onclick="switchTab(1)"><i class="fas fa-user"></i> Профіль</a>
                <a href="#" onclick="switchTab(2)"><i class="fas fa-search"></i> Рекомендації</a>
                <a href="#" onclick="switchTab(3)"><i class="fas fa-heart"></i> Інтереси</a>
            </nav>
            
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-value" id="total-people">28</span>
                    <span class="stat-label">Людей</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="total-edges">87</span>
                    <span class="stat-label">Зв'язків</span>
                </div>
            </div>
            
            <div class="search-box">
                <input type="text" id="global-search" placeholder="Пошук людини..." onkeyup="searchPeople(event)">
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="main-content">
            <!-- Header -->
            <header>
                <h2 id="page-title">Інтерактивний Граф Соцмережі</h2>
                <div class="header-actions">
                    <button onclick="randomizeConnections()" class="btn secondary">
                        <i class="fas fa-random"></i> Рандомізувати зв'язки
                    </button>
                    <button onclick="resetGraph()" class="btn secondary">
                        <i class="fas fa-undo"></i> Скинути
                    </button>
                </div>
            </header>
            
            <!-- Graph Tab -->
            <div id="tab-0" class="tab-content active">
                <div class="graph-container">
                    <svg id="graph-svg" width="100%" height="100%"></svg>
                    <div class="graph-legend">
                        <div><span class="node-dot"></span> — Людина</div>
                        <div><span class="edge-line"></span> — Дружба</div>
                    </div>
                </div>
                
                <div class="side-panel">
                    <h3>Інформація про вершину</h3>
                    <div id="node-info" class="node-info">
                        <p class="placeholder">Клікніть на людину на графі</p>
                    </div>
                    
                    <h3 style="margin-top: 30px;">Дії</h3>
                    <div class="actions">
                        <button onclick="addRandomEdge()" class="btn">Додати випадковий зв'язок</button>
                        <button onclick="showRecommendationsInPanel()" class="btn primary">Показати рекомендації</button>
                    </div>
                </div>
            </div>
            
            <!-- Profile Tab -->
            <div id="tab-1" class="tab-content">
                <div class="profile-grid" id="profile-grid">
                    <!-- Populated by JS -->
                </div>
            </div>
            
            <!-- Recommendations Tab -->
            <div id="tab-2" class="tab-content">
                <h2>Рекомендовані друзі</h2>
                <div id="recommendations-list" class="recommendations-list">
                    <!-- Populated by JS -->
                </div>
            </div>
            
            <!-- Interests Tab -->
            <div id="tab-3" class="tab-content">
                <h2>Всі інтереси в мережі</h2>
                <div id="all-interests" class="interests-cloud">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>
        
        <!-- Floating Action Button -->
        <button onclick="toggleAddMode()" id="fab" class="fab">
            <i class="fas fa-plus"></i>
        </button>
    </div>
    
    <!-- Modal for connecting people -->
    <div id="connect-modal" class="modal">
        <div class="modal-content">
            <h3>Зв'язок між <span id="modal-person1"></span> та <span id="modal-person2"></span></h3>
            <div class="modal-actions">
                <button onclick="toggleConnection()" id="connect-btn" class="btn primary">Під'єднати</button>
                <button onclick="closeModal()" class="btn secondary">Закрити</button>
            </div>
        </div>
    </div>
    
    <script src="data.js"></script>
    <script src="graph.js"></script>
    <script src="ui.js"></script>
</body>
</html>
